packages:
  btn_logic_3:
    text_sensor:
      - platform: homeassistant
        id: ts_btn_3
        entity_id: switch.virtual_is_wake
        on_value:
          then:
            - lvgl.widget.update:
                id: btn_3
                state:
                  checked: !lambda 'return x == "on";'
                  disabled: !lambda 'return x == "unavailable" || x == "unknown";'
            - lvgl.label.update:
                id: lbl_btn_3
                text: !lambda |-
                  if (x == "on") {
                    return "\U000F059C";
                  } else {
